<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A minimalistic, brutalist reconstruction estimator.">
  <title>Fucking Estimator</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/app.js" defer></script>
</head>
<body class="">
  <div class="container">
    <header>
      <h1>Fucking Estimator <span id="current-profile-name" class="profile-badge"></span></h1>
      <div class="nav-bar">
        <div class="nav-actions">
          <button id="btn-contractors">Contractors</button>
          <button id="btn-reset">Reset Defaults</button>
        </div>
        <button id="btn-back" class="hidden">&larr; Back</button>
      </div>
    </header>
    <main id="app-content">
      <!-- Dynamic content rendered here -->
    </main>
  </div>

  <div id="modal-add-contractor" class="modal hidden">
    <div class="modal-content">
      <h2>Add Contractor</h2>
      <div class="form-group">
        <label for="input-contractor-name">Contractor Name</label>
        <input type="text" id="input-contractor-name" placeholder="e.g. John Doe Construction">
      </div>
      <div class="nav-bar">
        <button id="btn-cancel-contractor">Cancel</button>
        <button id="btn-save-contractor" class="btn-primary">Save</button>
      </div>
    </div>
  </div>
</body>
</html>
